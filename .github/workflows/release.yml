name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm_pkg: marknest-darwin-arm64
            binary_name: marknest
          - target: x86_64-apple-darwin
            os: macos-14
            npm_pkg: marknest-darwin-x64
            binary_name: marknest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: marknest-linux-x64
            binary_name: marknest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: marknest-linux-arm64
            binary_name: marknest
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: marknest-win32-x64
            binary_name: marknest.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p marknest
          else
            cargo build --release --target ${{ matrix.target }} -p marknest
          fi
        shell: bash

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} staging/
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: staging/${{ matrix.binary_name }}
          retention-days: 1

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build crates/marknest-wasm --release --target web --out-dir pkg --out-name marknest_wasm

      - name: Patch package.json for npm
        run: |
          cd crates/marknest-wasm/pkg
          VERSION="${GITHUB_REF_NAME#v}"
          cat > package.json << PKGJSON
          {
            "name": "marknest-wasm",
            "version": "${VERSION}",
            "description": "WASM bindings for MarkNest - Markdown workspace analysis and HTML rendering in the browser",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "https://github.com/developer0hye/marknest"
            },
            "homepage": "https://github.com/developer0hye/marknest",
            "keywords": ["markdown", "pdf", "wasm", "converter", "browser"],
            "files": [
              "marknest_wasm_bg.wasm",
              "marknest_wasm.js",
              "marknest_wasm.d.ts",
              "marknest_wasm_bg.wasm.d.ts"
            ],
            "module": "marknest_wasm.js",
            "types": "marknest_wasm.d.ts",
            "sideEffects": ["./snippets/*"]
          }
          PKGJSON

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: crates/marknest-wasm/pkg/
          retention-days: 1

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish marknest-core
        run: cargo publish -p marknest-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "marknest-core already published, skipping"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish marknest
        run: cargo publish -p marknest --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "marknest already published, skipping"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish marknest-server
        run: cargo publish -p marknest-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || echo "marknest-server already published, skipping"

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries into npm packages
        run: |
          declare -A TARGET_TO_PKG=(
            ["aarch64-apple-darwin"]="marknest-darwin-arm64"
            ["x86_64-apple-darwin"]="marknest-darwin-x64"
            ["x86_64-unknown-linux-gnu"]="marknest-linux-x64"
            ["aarch64-unknown-linux-gnu"]="marknest-linux-arm64"
            ["x86_64-pc-windows-msvc"]="marknest-win32-x64"
          )

          for target in "${!TARGET_TO_PKG[@]}"; do
            pkg="${TARGET_TO_PKG[$target]}"
            pkg_dir="npm/${pkg}"
            mkdir -p "${pkg_dir}/bin"

            if [ "$target" = "x86_64-pc-windows-msvc" ]; then
              cp "artifacts/binary-${target}/marknest.exe" "${pkg_dir}/bin/"
            else
              cp "artifacts/binary-${target}/marknest" "${pkg_dir}/bin/"
              chmod +x "${pkg_dir}/bin/marknest"
            fi
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg_dir in npm/marknest-*/; do
            echo "Publishing $(basename $pkg_dir)..."
            cd "$pkg_dir"
            npm publish --access public || true
            cd ../..
          done

      - name: Publish umbrella package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/marknest
          npm publish --access public || echo "marknest already published, skipping"

  publish-wasm-npm:
    name: Publish WASM to npm
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: wasm-pkg

      - name: Publish WASM package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd wasm-pkg
          npm publish --access public || echo "marknest-wasm already published, skipping"

  github-release:
    name: GitHub Release
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package WASM release asset
        run: |
          mkdir -p release
          if [ -d "artifacts/wasm-pkg" ]; then
            tar -czf release/marknest-wasm.tar.gz -C artifacts/wasm-pkg .
          fi

      - name: Package release assets
        run: |
          mkdir -p release

          declare -A TARGETS=(
            ["aarch64-apple-darwin"]="marknest-aarch64-apple-darwin"
            ["x86_64-apple-darwin"]="marknest-x86_64-apple-darwin"
            ["x86_64-unknown-linux-gnu"]="marknest-x86_64-unknown-linux-gnu"
            ["aarch64-unknown-linux-gnu"]="marknest-aarch64-unknown-linux-gnu"
            ["x86_64-pc-windows-msvc"]="marknest-x86_64-pc-windows-msvc"
          )

          for target in "${!TARGETS[@]}"; do
            asset_name="${TARGETS[$target]}"
            if [ "$target" = "x86_64-pc-windows-msvc" ]; then
              cp "artifacts/binary-${target}/marknest.exe" "release/${asset_name}.exe"
            else
              cp "artifacts/binary-${target}/marknest" "release/${asset_name}"
              chmod +x "release/${asset_name}"
              tar -czf "release/${asset_name}.tar.gz" -C release "${asset_name}"
              rm "release/${asset_name}"
            fi
          done

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build contributors list
        id: contributors
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            CONTRIBUTORS=$(git log ${{ steps.prev_tag.outputs.tag }}..HEAD --format='%an' | sort -u | grep -v 'dependabot' || true)
          else
            CONTRIBUTORS=$(git log --format='%an' | sort -u | grep -v 'dependabot' || true)
          fi
          # Write to file to avoid quoting issues
          echo "$CONTRIBUTORS" > /tmp/contributors.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          CONTRIBUTORS=$(cat /tmp/contributors.txt)

          BODY="## Installation

          ### Cargo
          \`\`\`sh
          cargo install marknest
          \`\`\`

          ### npm / npx
          \`\`\`sh
          npx marknest --help
          # or install globally
          npm install -g marknest
          \`\`\`

          ### Download binary
          Download the appropriate binary for your platform from the assets below.

          ## Contributors
          ${CONTRIBUTORS}
          "

          gh release create "$TAG" release/* \
            --title "$TAG" \
            --notes "$BODY"
